<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSE ROOM | Creative Production House</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-red: #4a0e0e;
            --black: #050505;
            --gray: #1a1a1a;
            --text: #ffffff;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: var(--text); font-family: var(--font-sans); overflow-x: hidden; }

        /* --- Global Scrollbar --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--gold); }

        /* --- Header --- */
        header {
            position: fixed; width: 100%; top: 0; padding: 40px 6%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; transition: 0.5s;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 700; letter-spacing: 3px; color: var(--gold); }

        /* --- Hero Section --- */
        .hero {
            height: 100vh; width: 100%; position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .hero-video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: brightness(0.4) saturate(0.8);
            z-index: -1;
        }

        .hero-content { text-align: center; max-width: 900px; padding: 20px; animation: fadeInUp 1.5s ease; }
        .hero-content h1 { font-family: var(--font-serif); font-size: clamp(3rem, 10vw, 7rem); line-height: 0.9; margin-bottom: 20px; font-style: italic; }
        .hero-content p { font-weight: 200; letter-spacing: 8px; text-transform: uppercase; font-size: 0.9rem; color: var(--gold); }

        /* --- Portfolio Grid --- */
        .work { padding: 120px 6%; }
        .work-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; }
        .work-header h2 { font-family: var(--font-serif); font-size: 3.5rem; }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .item { position: relative; overflow: hidden; border-radius: 4px; transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.8s; }
        .item:hover img { filter: grayscale(0%); transform: scale(1.08); }

        /* Masonry Style */
        .item-1 { grid-column: span 8; height: 500px; }
        .item-2 { grid-column: span 4; height: 500px; }
        .item-3 { grid-column: span 4; height: 600px; }
        .item-4 { grid-column: span 8; height: 600px; }

        .item-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            transform: translateY(20px); opacity: 0; transition: 0.4s;
        }
        .item:hover .item-info { transform: translateY(0); opacity: 1; }
        .item-info h4 { font-family: var(--font-serif); font-size: 2rem; color: var(--gold); }

        /* --- Footer Section --- */
        .cta { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; }
        .btn-gold {
            padding: 20px 60px; border: 1px solid var(--gold); color: var(--gold);
            text-decoration: none; text-transform: uppercase; letter-spacing: 4px;
            font-size: 0.8rem; transition: 0.4s; margin-top: 40px;
        }
        .btn-gold:hover { background: var(--gold); color: black; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .item-1, .item-2, .item-3, .item-4 { grid-column: span 12; height: 400px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ROSE ROOM</div>
        <div style="letter-spacing: 3px; font-size: 0.7rem; font-weight: 600;">MENU</div>
    </header>

    <section class="hero">
        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=2000" class="hero-video-bg" alt="Hero Background">
        
        <div class="hero-content">
            <p>Productions Inc.</p>
            <h1>Defining the Art of Cinema.</h1>
        </div>
    </section>

    <section class="work">
        <div class="work-header">
            <h2>Selected Works</h2>
            <p style="color: var(--gold);">/ 2024-2026</p>
        </div>

        <div class="portfolio-grid">
            <div class="item item-1">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=1200" alt="Cinematography">
                <div class="item-info">
                    <p class="tag">Cinematography</p>
                    <h4>The Velvet Night</h4>
                </div>
            </div>

            <div class="item item-2">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&q=80&w=1200" alt="Direction">
                <div class="item-info">
                    <p class="tag">Direction</p>
                    <h4>Motion Story</h4>
                </div>
            </div>

            <div class="item item-3">
                <img src="https://images.unsplash.com/photo-1512213012282-75cae8018bbd?auto=format&fit=crop&q=80&w=1200" alt="Post Production">
                <div class="item-info">
                    <p class="tag">Post-Prod</p>
                    <h4>Golden Frames</h4>
                </div>
            </div>

            <div class="item item-4">
                <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&q=80&w=1200" alt="Interiors">
                <div class="item-info">
                    <p class="tag">Environment</p>
                    <h4>Royal Settings</h4>
                </div>
            </div>
        </div>
    </section>

    <section class="cta">
        <h2 style="font-family: var(--font-serif); font-size: 3rem; font-style: italic;">Start Your Project</h2>
        <a href="#" class="btn-gold">Contact Studio</a>
    </section>

    <footer style="padding: 40px; text-align: center; font-size: 0.7rem; letter-spacing: 2px; border-top: 1px solid #1a1a1a;">
        © 2026 ROSE ROOM PRODUCTIONS INC. — CASABLANCA / FLORIDA
    </footer>

</body>
</html>
