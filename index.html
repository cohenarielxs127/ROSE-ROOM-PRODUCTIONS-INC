<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Room Productions Agency Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #050505;
            --gray: #222;
            --muted: #a9989d;
            --text: #ffffff;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Sora b-7al Poster --- */
        .poster {
            width: min(600px, 100%);
            aspect-ratio: 4 / 5; /* Qeriba l-sora dyal-ek */
            background-color: var(--black);
            border: 2px solid var(--gray);
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* --- Header: Logo & Subtext --- */
        .poster-header {
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 20px;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .poster-subtext {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
            color: var(--muted);
            margin-top: 5px;
        }

        /* --- Middle: Golden Frames Icon --- */
        .poster-middle {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Had l-effect kiy3ti l-symbolism dyal l-frames o l-roses */
        .gold-icon {
            width: 150px;
            height: 150px;
            position: relative;
        }

        /* L-effect dial multiple frames */
        .gold-icon::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 2px solid var(--gold);
            opacity: 0.7;
            border-radius: 4px;
            transform: rotate(-10deg) scale(0.9);
        }

        .gold-icon::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 2px solid var(--gold);
            opacity: 0.7;
            border-radius: 4px;
            transform: rotate(5deg) scale(1.1);
        }
        
        /* L-symbolism dyal l-rose */
        .gold-icon-center {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: var(--gold);
            font-size: 4rem;
        }

        /* --- Footer: Contact Infos --- */
        .poster-footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 30px;
            text-align: left;
        }

        .contact-infos {
            display: grid;
            gap: 15px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
            font-size: 0.8rem;
        }

        .label {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .value {
            color: var(--text);
            font-weight: 400;
            letter-spacing: 1px;
        }

        .poster-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 25px;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div class="poster">
        
        <div class="poster-header">
            <div class="logo">Rose Room</div>
            <div class="poster-subtext">Productions Inc. — Post Production</div>
        </div>

        <div class="poster-middle">
            <div class="gold-icon">
                <div class="gold-icon-center">🌹</div>
            </div>
        </div>

        <div class="poster-footer">
            <div class="poster-title">Golden Frames Agency</div>
            
            <div class="contact-infos">
                <div class="contact-row">
                    <div class="label">Company</div>
                    <div class="value">Rose Room Productions Inc.</div>
                </div>
                <div class="contact-row">
                    <div class="label">Email</div>
                    <div class="value">contact@roseroomproductionsinc.com</div>
                </div>
                <div class="contact-row">
                    <div class="label">Address</div>
                    <div class="value">Longview Ave, Kissimmee, FL 34747-5037, USA</div>
                </div>
                <div class="contact-row">
                    <div class="label">Number</div>
                    <div class="value">+1 1 279 259 0713</div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
